name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create signing keystore
        run: |
          keytool -genkey -v -keystore ${{ github.workspace }}/release.keystore \
            -alias '${{ secrets.KEY_ALIAS || 'androiddebugkey' }}' \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass '${{ secrets.STORE_PASSWORD || 'android' }}' \
            -keypass '${{ secrets.KEY_PASSWORD || secrets.STORE_PASSWORD || 'android' }}' \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=CN"

      - name: Create local.properties
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "storeFile=${{ github.workspace }}/release.keystore"
            echo "keyAlias=${{ secrets.KEY_ALIAS || 'androiddebugkey' }}"
            echo "storePassword=${{ secrets.STORE_PASSWORD || 'android' }}"
          } > local.properties

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build mobile-arm64_v8a-debug APK
        run: ./gradlew assembleMobileArm64_v8aDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-arm64_v8a
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
