name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # Prebuilt Media3 AARs from https://github.com/861052359/media
  MEDIA3_AAR_REPO: 861052359/media
  MEDIA3_AAR_TAG: media3-aars-1.10.1-fongmi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      # Chaquopy needs BuildPython 3.10 (see chaquo/build.gradle)
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Media3 lib-*.aar into app/libs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p app/libs
          echo "Downloading Media3 AARs from ${MEDIA3_AAR_REPO}@${MEDIA3_AAR_TAG}"
          # Public release assets on the same GitHub account; gh needs auth for API rate limits.
          gh release download "${MEDIA3_AAR_TAG}" \
            --repo "${MEDIA3_AAR_REPO}" \
            --dir app/libs \
            --pattern 'lib-*.aar' \
            --clobber
          count="$(find app/libs -maxdepth 1 -name 'lib-*.aar' | wc -l)"
          echo "Found ${count} lib-*.aar in app/libs"
          ls -lah app/libs/lib-*.aar | head -40
          if [ "${count}" -lt 10 ]; then
            echo "Expected at least 10 Media3 AARs, found ${count}" >&2
            exit 1
          fi

      - name: Create signing keystore
        run: |
          keytool -genkey -v -keystore ${{ github.workspace }}/release.keystore \
            -alias '${{ secrets.KEY_ALIAS || 'androiddebugkey' }}' \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass '${{ secrets.STORE_PASSWORD || 'android' }}' \
            -keypass '${{ secrets.KEY_PASSWORD || secrets.STORE_PASSWORD || 'android' }}' \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=CN"

      - name: Create local.properties
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "storeFile=${{ github.workspace }}/release.keystore"
            echo "keyAlias=${{ secrets.KEY_ALIAS || 'androiddebugkey' }}"
            echo "storePassword=${{ secrets.STORE_PASSWORD || 'android' }}"
          } > local.properties

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build mobile-arm64_v8a-debug APK
        run: ./gradlew assembleMobileArm64_v8aDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-arm64_v8a
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
